<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Proxy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: #222; color: white; }
        .search-bar { padding: 15px; background: #333; display: flex; gap: 10px; justify-content: center; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        iframe { flex-grow: 1; border: none; width: 100%; background: white; }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., example.com)">
        <button onclick="searchUrl()">Go</button>
    </div>

    <iframe id="proxyFrame" src=""></iframe>

    <script>
        function searchUrl() {
            let url = document.getElementById("urlInput").value;
            if (!url) return;
            
            // Add https:// if the user forgets it
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }

            // Set the iframe source to Netlify proxy 
            document.getElementById("proxyFrame").src = `/proxy?url=${encodeURIComponent(url)}`;
        }

        // Allow because if thye press rnter
        document.getElementById("urlInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                searchUrl();
            }
        });
    </script>

</body>
</html>
